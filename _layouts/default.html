<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>UCSD Pep Band</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>{{ page.title }}</title>
    <!-- link to main stylesheet -->
    <link rel="stylesheet" type="text/css" href="/css/main.css">
    
    <style>
        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background-color: #f4f6f8;
            color: #1a1a1a;
        }

        header {
            background-color: #002B5C; /* UCSD Navy */
            color: white;
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h1 {
            margin: 0;
            font-size: 28px;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin-left: 20px;
            font-weight: bold;
        }

        nav a:hover {
            text-decoration: underline;
        }

        .hero {
            background-color: #FDB927; /* UCSD Gold */
            text-align: center;
            padding: 80px 20px;
        }

        .hero h2 {
            font-size: 40px;
            margin-bottom: 20px;
        }

        .hero p {
            font-size: 18px;
            max-width: 700px;
            margin: 0 auto 30px auto;
        }

        .hero button {
            padding: 12px 24px;
            font-size: 16px;
            background-color: #002B5C;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        .hero button:hover {
            background-color: #001f40;
        }

        .section {
            padding: 60px 40px;
            text-align: center;
        }

        .section h3 {
            font-size: 28px;
            margin-bottom: 20px;
        }

        .cards {
            display: flex;
            justify-content: center;
            gap: 30px;
            flex-wrap: wrap;
            margin-top: 30px;
        }

        .card {
            background-color: white;
            padding: 25px;
            width: 280px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        footer {
            background-color: #002B5C;
            color: white;
            text-align: center;
            padding: 20px;
            margin-top: 40px;
        }

        @media (max-width: 768px) {
            .cards {
                flex-direction: column;
                align-items: center;
            }
        }
    </style>
</head>
    <body>
        <nav>
                <ul>
                    <li><a href="/">Home</a></li>
                    <li><a href="/about">About</a></li>
                    <li><a href="/cv">CV</a></li>
                    <li><a href="/blog">Blog</a></li>
                </ul>
        </nav>
        <footer>
                <ul>
                    <li><a href="mailto:pepband@ucsd.edu">email</a></li>
                </ul>
        </footer>
    </body>
</html>
